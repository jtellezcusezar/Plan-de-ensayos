[theme]
base = "light"

[theme.light]
primaryColor = "#4A7BA8"
backgroundColor = "#F6F8FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"
baseRadius = "0.75rem"
borderColor = "#E5E9F0"
showSidebarBorder = false
chartCategoricalColors = ["#7BA7D4", "#6BBF9E", "#E8C17A", "#D98B8B", "#4A7BA8"]
chartSequentialColors = ["#EEF3FA", "#C8DCF0", "#7BA7D4", "#4A7BA8", "#2F5F8A"]

[theme.dark]
primaryColor = "#7BA7D4"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#111827"
textColor = "#E5ECF6"
font = "sans serif"
baseRadius = "0.75rem"
borderColor = "#243041"
showSidebarBorder = false
chartCategoricalColors = ["#7BA7D4", "#6BBF9E", "#E8C17A", "#D98B8B", "#A9C6E5"]
chartSequentialColors = ["#172033", "#223047", "#294462", "#4A7BA8", "#7BA7D4"]

